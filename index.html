<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />

    <!-- 🔧 PWA Meta Tags -->
    <meta name="theme-color" content="#22c55e" />
    <meta
      name="description"
      content="AI-powered urban greening visualization tool. Transform satellite images into green spaces with advanced AI."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Eco-Urbanist AI" />
    <link rel="icon" href="/vite.svg" type="image/svg+xml" />

    <!-- 🔧 FIX: vite-plugin-pwa generates "manifest.webmanifest" by default,
         not "manifest.json". The original link pointed to a file that is
         never produced by the build, so the browser 404s on it and PWA
         install metadata/icons may fail to load correctly. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Eco-Urbanist AI - Transform Cities with AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
